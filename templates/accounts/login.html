{% extends 'base.html' %}

{% block content %}
<section class="form-section">
    <div class="container">
        <div class="form-card">
            <div class="form-header">
                <h2>Welcome Back</h2>
                <p>Login to manage your catering bookings</p>
            </div>

            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label>Email Address</label>
                    {{ form.username }}
                </div>
                <div class="form-group">
                    <label>Password</label>
                    {{ form.password }}
                </div>

                <button type="submit" class="btn btn-gradient" style="width: 100%; margin-top: 20px;">Login</button>
            </form>

            <div class="form-footer">
                <p>Don't have an account? <a href="{% url 'register' %}"
                        style="color: var(--primary); font-weight: 600;">Register here</a></p>
            </div>
        </div>
    </div>
</section>
{% endblock %}
